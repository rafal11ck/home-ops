[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
ROOT_DIR = "{{config_root}}"
KUBERNETES_DIR = '{{config_root}}/kubernetes'
SCRIPTS_DIR = '{{config_root}}/scripts'
BOOTSTRAP_DIR = '{{config_root}}/bootstrap'
TALOS_DIR = '{{config_root}}/talos'
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tasks.deps]
description = "Install dependencies"
run = "uv pip install -r requirements.txt"

[tools]
# Template tools
python = "3.14.5"
uv = "latest"
# Operations tools
"aqua:budimanjojo/talhelper" = "3.1.11"
"aqua:cloudflare/cloudflared" = "2026.6.0"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.8.8"
"aqua:getsops/sops" = "3.13.1"
"aqua:go-task/task" = "3.51.1"
"aqua:helm/helm" = "4.2.0"
"aqua:helmfile/helmfile" = "1.5.3"
"aqua:jqlang/jq" = "1.7.1"
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"aqua:kubernetes/kubectl" = "1.33.1"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:siderolabs/talos" = "1.13.4"
"aqua:yannh/kubeconform" = "0.8.0"
"github:a8m/envsubst" = "1.4.3"
"github:cilium/cilium-cli" = "0.19.4"
"github:cilium/hubble" = "1.19.4"
"github:derailed/k9s" = "0.51.0"