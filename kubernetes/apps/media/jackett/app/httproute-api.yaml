---
# Torznab/RSS results feeds — separate route NOT covered by the SecurityPolicy,
# so OIDC login is bypassed here. Still guarded by Jackett's per-indexer apikey
# (ResultsController has a class-level RequiresApiKey filter).
# Must be a distinct HTTPRoute because this Envoy Gateway version cannot target
# a single route rule via SecurityPolicy sectionName.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jackett-api
spec:
  hostnames:
    - jackett.${SECRET_DOMAIN}
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https-subdomains
  rules:
    - matches:
        - path:
            type: RegularExpression
            value: ^/api/v2\.0/indexers/[^/]+/results(/(torznab|potato)(/[^/]+)?)?$
      backendRefs:
        - name: jackett
          port: 9117
