---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ceph-csi-operator
spec:
  interval: 1h
  url: https://ceph.github.io/ceph-csi-operator
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.4
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    drivers:
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        enabled: true
        nodePlugin:
          resources:
            plugin:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
            registrar:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            liveness: {}
            addons: {}
            logRotator: {}
        controllerPlugin:
          replicas: 1
          resources:
            liveness: {}
            addons: {}
            logRotator: {}
            plugin:
              requests:
                memory: 128Mi
              limits:
                memory: 1Gi
            provisioner:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            attacher:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            resizer:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            snapshotter:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            omapGenerator:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
      cephfs:
        name: rook-ceph.cephfs.csi.ceph.com
        enabled: true
        kernelMountOptions:
          ms_mode: prefer-crc
        nodePlugin:
          resources:
            plugin:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
            registrar:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            liveness: {}
            addons: {}
            logRotator: {}
        controllerPlugin:
          replicas: 1
          resources:
            liveness: {}
            addons: {}
            logRotator: {}
            omapGenerator: {}
            plugin:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
            provisioner:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            attacher:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            resizer:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            snapshotter:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
      nfs:
        enabled: false
      nvmeof:
        enabled: false
    operatorConfig:
      name: ceph-csi-operator-config
      driverSpecDefaults:
        clusterName: rook-ceph
        cephFsClientType: kernel
        imageSet:
          name: rook-csi-operator-image-set-configmap
        controllerPlugin:
          hostNetwork: true
