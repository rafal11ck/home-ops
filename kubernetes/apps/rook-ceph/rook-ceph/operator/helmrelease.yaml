---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-operator
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: rook-ceph
      version: v1.20.1
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    monitoring:
      enabled: true
    csi:
      enableLiveness: true
      cephFSKernelMountOptions: ms_mode=prefer-crc
      serviceMonitor:
        enabled: true
      csiRBDPluginResource: |
        - name: driver-registrar
          resource:
            requests:
              memory: 64Mi
              cpu: 10m
            limits:
              memory: 128Mi
        - name: csi-rbdplugin
          resource:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
      csiCephFSPluginResource: |
        - name: driver-registrar
          resource:
            requests:
              memory: 64Mi
              cpu: 10m
            limits:
              memory: 128Mi
        - name: csi-cephfsplugin
          resource:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
      csiRBDProvisionerResource: |
        - name: csi-rbdplugin
          resource:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
        - name: csi-provisioner
          resource:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
        - name: csi-resizer
          resource:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
        - name: csi-attacher
          resource:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
        - name: csi-snapshotter
          resource:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
      csiCephFSProvisionerResource: |
        - name: csi-cephfsplugin
          resource:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
        - name: csi-provisioner
          resource:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
        - name: csi-resizer
          resource:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
        - name: csi-attacher
          resource:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
        - name: csi-snapshotter
          resource:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
