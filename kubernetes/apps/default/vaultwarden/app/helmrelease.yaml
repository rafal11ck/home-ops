---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vaultwarden
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: vaultwarden/server
              tag: 1.35.8@sha256:c4f6056fe0c288a052a223cecd263a90d1dda1a0177bb5b054a363a6c7b211d9
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ 'ALL' ] }
            env:
              ROCKET_PORT: '8080'
              DOMAIN: https://vaultwarden.${SECRET_DOMAIN}
              TZ: ${SECRET_TIMEZONE}
              DATABASE_URL:
                secretKeyRef:
                  name: vaultwarden-database-app
                  key: uri
            envFrom:
              - secretRef:
                  name: vaultwarden-secret
            probes:
              liveness: &probe
                enabled: true
                type: HTTP
                path: /alive
              readiness: *probe
              startup:
                <<: *probe
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
        pod:
          priorityClassName: system-cluster-critical
    service:
      vaultwarden:
        controller: vaultwarden
        ports:
          http:
            port: &port 8080
    route:
      vaultwarden:
        hostnames:
          - &host 'vaultwarden.${SECRET_DOMAIN}'
        rules:
          - backendRefs:
              - name: *app
                port: *port
        parentRefs:
          - name: internal
            namespace: envoy-gateway-system
            sectionName: https-subdomains
          - name: external
            namespace: envoy-gateway-system
            sectionName: https-subdomains
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /data
