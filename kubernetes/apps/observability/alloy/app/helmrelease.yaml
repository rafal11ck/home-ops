---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-charts
spec:
  interval: 1h
  url: https://grafana.github.io/helm-charts
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: alloy
      version: 1.11.0
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controller:
      type: deployment
      replicas: 1
    alloy:
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          memory: 256Mi
      configMap:
        content: |-
          logging {
            level  = "info"
            format = "logfmt"
          }

          mimir.rules.kubernetes "sync" {
            address = "http://mimir-ruler.observability.svc.cluster.local:8080"

            rule_namespace_selector {
              match_labels = {}
            }

            rule_selector {
              match_labels = {}
            }
          }
