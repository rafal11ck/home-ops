---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app ngnix
  namespace: flux-system
spec:
  interval: 30m
  timeout: 5m
  path: ./kubernetes/apps/testing/nginx/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
